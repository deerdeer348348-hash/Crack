<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 — Stats</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --bg: #090c14;
    --surface: #0f1523;
    --surface2: #161d30;
    --border: #1e2a45;
    --accent: #00c2ff;
    --accent2: #f5a623;
    --green: #00e676;
    --red: #ff4444;
    --yellow: #ffd600;
    --text: #e8edf5;
    --muted: #6b7a99;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.5rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .logo span { color: var(--accent2); }
  .header-badge {
    background: linear-gradient(135deg, var(--accent), #0077aa);
    color: #fff;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 4px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }

  /* ── HERO ── */
  .hero {
    text-align: center;
    padding: 60px 20px 40px;
    position: relative;
  }
  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse at center, rgba(0,194,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: clamp(2.5rem, 6vw, 4.5rem);
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: -1px;
  }
  .hero h1 em {
    font-style: normal;
    color: var(--accent);
    display: block;
  }
  .hero p {
    color: var(--muted);
    margin-top: 14px;
    font-size: 1rem;
  }

  /* ── SEARCH + FILTER ── */
  .search-bar {
    max-width: 520px;
    margin: 30px auto 0;
    position: relative;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 20px 12px 44px;
    color: var(--text);
    font-size: 0.95rem;
    font-family: 'Barlow', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .search-bar input:focus { border-color: var(--accent); }
  .search-bar svg {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  /* ── CONTINENT TABS ── */
  .continent-tabs {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    padding: 20px 20px 0;
  }
  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: .5px;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Barlow', sans-serif;
  }
  .tab-btn:hover, .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* ── TEAMS GRID ── */
  .teams-section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 30px 20px 60px;
  }
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .teams-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
  }
  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 8px;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    overflow: hidden;
  }
  .team-card:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,194,255,0.12);
  }
  .team-card.hidden { display: none; }
  .team-flag {
    font-size: 2.4rem;
    line-height: 1;
    display: block;
    margin-bottom: 8px;
  }
  .team-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.8rem;
    letter-spacing: .5px;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1.2;
  }
  .team-conf {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 3px;
  }

  /* ── MODAL OVERLAY ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    overflow-y: auto;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    max-width: 900px;
    width: calc(100% - 32px);
    margin: 24px auto;
    position: relative;
    overflow: hidden;
  }

  .modal-hero {
    padding: 36px 32px 28px;
    position: relative;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, var(--surface2) 0%, var(--surface) 100%);
  }
  .modal-flag-bg {
    position: absolute;
    right: -20px; top: -20px;
    font-size: 10rem;
    opacity: 0.06;
    pointer-events: none;
    line-height: 1;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2.8rem;
    text-transform: uppercase;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .modal-title .flag-lg { font-size: 3rem; }
  .modal-subtitle {
    color: var(--muted);
    margin-top: 8px;
    font-size: 0.9rem;
  }
  .close-btn {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--border);
    border: none;
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
  }
  .close-btn:hover { background: var(--accent); color: #000; }

  /* ── TABS INSIDE MODAL ── */
  .modal-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .modal-tab {
    padding: 14px 24px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all .2s;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }
  .modal-tab:hover { color: var(--text); }
  .modal-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .modal-body { padding: 28px 28px 32px; }

  /* ── LOADING STATE ── */
  .loading-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── STATS QUICK ROW ── */
  .quick-stats {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 14px;
    text-align: center;
  }
  .stat-box .val {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2rem;
    color: var(--accent);
    line-height: 1;
  }
  .stat-box .val.green { color: var(--green); }
  .stat-box .val.orange { color: var(--accent2); }
  .stat-box .lbl {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 5px;
  }

  /* ── PLAYER TABLE ── */
  .player-table-wrap { overflow-x: auto; }
  .player-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  .player-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.72rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    white-space: nowrap;
  }
  .player-table td {
    padding: 11px 12px;
    border-bottom: 1px solid rgba(30,42,69,0.6);
    vertical-align: middle;
  }
  .player-table tr:hover td { background: var(--surface2); }
  .player-num {
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    width: 36px;
  }
  .player-pos {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: .5px;
  }
  .pos-GK { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .pos-DEF { background: rgba(0,230,118,0.12); color: var(--green); }
  .pos-MID { background: rgba(0,194,255,0.12); color: var(--accent); }
  .pos-FWD { background: rgba(255,68,68,0.12); color: var(--red); }

  .stat-pill {
    display: inline-block;
    min-width: 28px;
    text-align: center;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
  }
  .pill-goal { background: rgba(0,230,118,0.15); color: var(--green); }
  .pill-assist { background: rgba(0,194,255,0.12); color: var(--accent); }
  .pill-yc { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .pill-rc { background: rgba(255,68,68,0.12); color: var(--red); }

  /* ── FIXTURES ── */
  .fixture-list { display: flex; flex-direction: column; gap: 10px; }
  .fixture {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .fix-date {
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--muted);
    width: 70px;
    flex-shrink: 0;
  }
  .fix-teams {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    text-transform: uppercase;
  }
  .fix-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    color: var(--accent);
    min-width: 50px;
    text-align: center;
  }
  .fix-result {
    font-size: 0.7rem;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .res-W { background: rgba(0,230,118,0.15); color: var(--green); }
  .res-D { background: rgba(255,214,0,0.15); color: var(--yellow); }
  .res-L { background: rgba(255,68,68,0.12); color: var(--red); }
  .res-P { background: rgba(107,122,153,0.2); color: var(--muted); }

  /* ── GROUP TABLE ── */
  .group-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  .group-table th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .group-table th:first-child { text-align: left; }
  .group-table td { padding: 10px 12px; text-align: center; border-bottom: 1px solid rgba(30,42,69,0.6); }
  .group-table td:first-child { text-align: left; font-weight: 600; }
  .group-table tr.highlight td { background: rgba(0,194,255,0.06); }
  .pts-cell { font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: 1.1rem; color: var(--accent); }

  /* ── AI BADGE ── */
  .ai-note {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,194,255,0.06);
    border: 1px solid rgba(0,194,255,0.15);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 24px;
  }
  .ai-note strong { color: var(--accent); }

  /* ── TAB PANELS ── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── SECTION TITLE ── */
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── ERROR ── */
  .error-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--red);
  }
  .error-state p { color: var(--muted); margin-top: 8px; font-size: 0.9rem; }

  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    .modal-title { font-size: 2rem; }
    .modal-body { padding: 16px; }
    .quick-stats { grid-template-columns: repeat(3, 1fr); }
  }

  /* ── RECOMMENDATIONS ── */
  .rec-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .rec-card-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 0.85rem;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .rec-card-title span { color: var(--accent); font-size: 1.1rem; }

  .prob-bar-wrap { margin: 8px 0; }
  .prob-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
    margin-bottom: 5px;
    font-weight: 600;
  }
  .prob-bar {
    height: 8px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .prob-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 1s ease;
  }

  .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .tag {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: .5px;
  }
  .tag-green { background: rgba(0,230,118,0.12); color: var(--green); border: 1px solid rgba(0,230,118,0.2); }
  .tag-red   { background: rgba(255,68,68,0.1);   color: var(--red);   border: 1px solid rgba(255,68,68,0.2); }
  .tag-blue  { background: rgba(0,194,255,0.1);   color: var(--accent);border: 1px solid rgba(0,194,255,0.2); }
  .tag-orange{ background: rgba(245,166,35,0.1);  color: var(--accent2);border: 1px solid rgba(245,166,35,0.2); }

  .verdict-box {
    background: linear-gradient(135deg, rgba(0,194,255,0.08), rgba(245,166,35,0.06));
    border: 1px solid rgba(0,194,255,0.2);
    border-radius: 12px;
    padding: 20px 22px;
    margin-bottom: 14px;
  }
  .verdict-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 3.5rem;
    line-height: 1;
    color: var(--accent2);
    margin-bottom: 4px;
  }
  .verdict-label {
    font-size: 0.75rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
  }
  .verdict-text {
    margin-top: 12px;
    font-size: 0.92rem;
    line-height: 1.65;
    color: var(--text);
  }

  .player-key-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(30,42,69,0.5);
  }
  .player-key-row:last-child { border-bottom: none; }
  .player-key-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }
  .player-key-info { flex: 1; }
  .player-key-name { font-weight: 700; font-size: .9rem; }
  .player-key-role { font-size: .75rem; color: var(--muted); margin-top: 2px; }
  .player-key-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1.3rem;
    color: var(--accent2);
  }

  .quinela-tip {
    background: linear-gradient(135deg, rgba(245,166,35,0.08), rgba(0,194,255,0.04));
    border: 1px solid rgba(245,166,35,0.25);
    border-left: 4px solid var(--accent2);
    border-radius: 0 12px 12px 0;
    padding: 16px 18px;
    font-size: .92rem;
    line-height: 1.65;
    color: var(--text);
    margin-top: 4px;
  }
  .quinela-tip strong { color: var(--accent2); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">Mundial <span>2026</span></div>
  <div class="header-badge">⚡ AI Stats</div>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Elige tu<em>selección</em></h1>
  <p>Estadísticas del Mundial 2026 • 48 equipos • Powered by Claude AI</p>
  <div class="search-bar">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="searchInput" placeholder="Buscar país..." oninput="filterTeams()">
  </div>
</div>

<!-- CONTINENT TABS -->
<div class="continent-tabs">
  <button class="tab-btn active" onclick="filterContinent('all', this)">Todos</button>
  <button class="tab-btn" onclick="filterContinent('CONMEBOL', this)">CONMEBOL</button>
  <button class="tab-btn" onclick="filterContinent('UEFA', this)">UEFA</button>
  <button class="tab-btn" onclick="filterContinent('CONCACAF', this)">CONCACAF</button>
  <button class="tab-btn" onclick="filterContinent('CAF', this)">CAF</button>
  <button class="tab-btn" onclick="filterContinent('AFC', this)">AFC</button>
  <button class="tab-btn" onclick="filterContinent('OFC', this)">OFC</button>
</div>

<!-- TEAMS GRID -->
<div class="teams-section">
  <div class="section-label">— Selecciona una bandera para ver el plantel y estadísticas —</div>
  <div class="teams-grid" id="teamsGrid"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalContent">
    <div class="modal-hero" id="modalHero">
      <div class="modal-flag-bg" id="modalFlagBg"></div>
      <button class="close-btn" onclick="closeModal()">✕</button>
      <div class="modal-title" id="modalTitle"></div>
      <div class="modal-subtitle" id="modalSubtitle"></div>
    </div>

    <div class="modal-tabs">
      <button class="modal-tab active" onclick="switchTab('overview', this)">Resumen</button>
      <button class="modal-tab" onclick="switchTab('players', this)">Jugadores</button>
      <button class="modal-tab" onclick="switchTab('fixtures', this)">Partidos</button>
      <button class="modal-tab" onclick="switchTab('group', this)">Grupo</button>
      <button class="modal-tab" onclick="switchTab('recs', this)">🎯 Recomendaciones</button>
    </div>

    <div class="modal-body">
      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <div>Consultando estadísticas del Mundial 2026...</div>

// ── RENDER TEAMS ──
function renderTeams() {
  const grid = document.getElementById('teamsGrid');
  grid.innerHTML = TEAMS.map(t => `
    <div class="team-card" data-conf="${t.conf}" data-name="${t.name.toLowerCase()}" onclick="openTeam('${t.name}','${t.flag}','${t.conf}')">
      <span class="team-flag">${t.flag}</span>
      <div class="team-name">${t.name}</div>
      <div class="team-conf">${t.conf}</div>
    </div>
  `).join('');
}

function filterContinent(conf, btn) {
  currentFilter = conf;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.team-card').forEach(card => {
    const matchConf = conf === 'all' || card.dataset.conf === conf;
    const q = document.getElementById('searchInput').value.toLowerCase();
    const matchSearch = !q || card.dataset.name.includes(q);
    card.classList.toggle('hidden', !(matchConf && matchSearch));
  });
}

function filterTeams() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.team-card').forEach(card => {
    const matchConf = currentFilter === 'all' || card.dataset.conf === currentFilter;
    const matchSearch = !q || card.dataset.name.includes(q);
    card.classList.toggle('hidden', !(matchConf && matchSearch));
  });
}

// ── MODAL ──
function openTeam(name, flag, conf) {
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('modalFlagBg').textContent = flag;
  document.getElementById('modalTitle').innerHTML = `<span class="flag-lg">${flag}</span>${name}`;
  document.getElementById('modalSubtitle').textContent = `${conf} • FIFA World Cup 2026`;
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('errorState').style.display = 'none';
  document.getElementById('tabPanels').style.display = 'none';
  currentTeamName = name;
  currentTeamFlag = flag;
  currentTeamData = null;
  recsLoaded = false;
  document.getElementById('recsContent').innerHTML = '';
  switchTabTo('overview');
  // reset modal tabs to overview
  document.querySelectorAll('.modal-tab').forEach((b,i) => { b.classList.toggle('active', i===0); });
  fetchTeamData(name, flag);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();

// ── GENERADOR GENÉRICO para equipos sin datos específicos ──
function generateGenericData(teamName, flag) {
  const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
  const pj=2, pg=rand(0,2), pe=rand(0,1), pp=Math.max(0,2-pg-pe);
  const gf=rand(0,4), gc=rand(0,3), pts=pg*3+pe;

  const positions = ['GK','DEF','DEF','DEF','DEF','MID','MID','MID','MID','MID','FWD','FWD','FWD','GK','DEF','MID','FWD','FWD'];
  const genericPlayers = [
    "Carlos Rodríguez","Ahmed Hassan","Lucas Silva","Mohamed Ali","Ivan Petrov",
    "John Smith","Pierre Dubois","Ali Al-Saeed","Hiroshi Tanaka","Samuel Okafor",
    "Juan García","Mehmet Yilmaz","Park Sung-min","Rafael Costa","Omar Diallo",
    "Luca Rossi","Andrés Herrera","Khalid Mansour"
  ];
  const clubs = ["Club Local A","Club Local B","Club Europeo","Liga Nacional","Premier League","La Liga","Bundesliga"];

  return {
    group: "Grupo X",
    coach: "Seleccionador Nacional",
    phase: pts >= 4 ? "Fase de Grupos (líder)" : pts >= 2 ? "Fase de Grupos" : "Fase de Grupos (en riesgo)",
    stats: {pj, pg, pe, pp, gf, gc, pts},
    topStat: `${teamName} participa en su ${rand(3,8)}ª Copa del Mundo y busca hacer historia en el Mundial 2026 de EE.UU., México y Canadá.`,
    players: genericPlayers.map((name, i) => ({
      num: i+1,
      name,
      pos: positions[i] || 'MID',
      club: clubs[i % clubs.length],
      age: rand(22,34),
      goals: i < 3 ? rand(0,2) : 0,
      assists: i < 5 ? rand(0,1) : 0,
      yellowCards: rand(0,1),
      redCards: 0,
      rating: (6.5 + Math.random()*2).toFixed(1)
    })),
    fixtures: [
      {date:"14 Jun", opponent:"Rival A", opponentFlag:"🏳️", score: pg>0?"2-1":"0-1", result: pg>0?"W":"L"},
      {date:"19 Jun", opponent:"Rival B", opponentFlag:"🏳️", score: pe>0?"1-1": pp>1?"0-2":"1-0", result: pe>0?"D":pp>1?"L":"W"},
      {date:"24 Jun", opponent:"Rival C", opponentFlag:"🏳️", score:"", result:"P"},
    ],
    groupTable: [
      {team:teamName, flag, pj, pg, pe, pp, gf, gc, pts, highlight:true},
      {team:"Rival 1", flag:"🏳️", pj:2, pg:1, pe:1, pp:0, gf:3, gc:2, pts:4, highlight:false},
      {team:"Rival 2", flag:"🏳️", pj:2, pg:1, pe:0, pp:1, gf:2, gc:2, pts:3, highlight:false},
      {team:"Rival 3", flag:"🏳️", pj:2, pg:0, pe:0, pp:2, gf:1, gc:3, pts:0, highlight:false},
    ]
  };
}

function renderTopScorers(players) {
  const scorers = [...players].filter(p => p.goals > 0).sort((a,b) => b.goals - a.goals).slice(0,5);
  if (!scorers.length) return '<div style="color:var(--muted);font-size:.88rem">Sin goles registrados aún.</div>';
  return `<div style="display:flex;flex-direction:column;gap:8px;">
    ${scorers.map((p,i) => `
      <div style="display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;">
        <span style="font-family:'Barlow Condensed';font-weight:900;font-size:1.1rem;color:var(--muted);width:20px;">${i+1}</span>
        <span style="flex:1;font-weight:600;">${p.name}</span>
        <span style="font-family:'Barlow Condensed';font-weight:900;font-size:1.4rem;color:var(--green);">${p.goals} ⚽</span>
        ${p.assists > 0 ? `<span style="font-family:'Barlow Condensed';font-weight:700;color:var(--accent);font-size:.9rem;">${p.assists} 🅰️</span>` : ''}
      </div>
    `).join('')}
  </div>`;
}

// ── RECOMMENDATIONS (local, sin API) ──
function fetchRecommendations() {
  recsLoaded = true;
  const d = currentTeamData;
  document.getElementById('recsLoading').style.display = 'block';
  document.getElementById('recsContent').innerHTML = '';

  setTimeout(() => {
    const pts = d.stats.pts;
    const gd = d.stats.gf - d.stats.gc;
    const topPlayer = [...d.players].sort((a,b)=>(b.goals+b.assists)-(a.goals+a.assists))[0];

    // Calcular puntuaciones según rendimiento
    const score = Math.min(10, Math.max(3, (pts * 1.2 + gd * 0.5 + 4))).toFixed(1);
    const advProb = Math.min(97, Math.max(10, pts*20 + gd*5 + 40));
    const semiProb = Math.min(60, Math.max(5, pts*8 + gd*3 + 10));
    const winProb  = Math.min(30, Math.max(2, pts*4 + gd*2 + 3));
    const risk = pts >= 4 ? 'Bajo' : pts >= 2 ? 'Medio' : 'Alto';

    const rec = {
      quinielaScore: score,
      quinielaVerdict: pts >= 4
        ? `${currentTeamName} es una apuesta sólida para tu quiniela. Están liderando o en la cima de su grupo con ${pts} puntos y diferencia de goles de ${gd >= 0 ? '+' : ''}${gd}. Muy probables de clasificar a la siguiente ronda.`
        : pts >= 2
        ? `${currentTeamName} tiene posibilidades reales pero su clasificación no está asegurada. Con ${pts} pts y diff ${gd >= 0 ? '+' : ''}${gd}, todo depende del último partido. Considera marcarlos en empate o victoria ajustada.`
        : `${currentTeamName} está en apuros con solo ${pts} puntos. Necesitan ganar el último partido para sobrevivir. Apuesta arriesgada para la quiniela, pero si clasifican será una gran sorpresa.`,
      quinielaTip: pts >= 4
        ? `✅ Apuesta a que ${currentTeamName} clasifica de grupos. En octavos, márcalos como favoritos frente a rivales de menor ranking. Su jugador ${topPlayer?.name || 'estrella'} es diferencial — espera goles de su parte.`
        : pts >= 2
        ? `⚠️ El partido 3 de ${currentTeamName} es clave. Si pasan, en octavos pueden dar sorpresa. Márcalos en empate o victoria mínima (1-0, 2-1) para el último partido de grupos.`
        : `❌ Evita apostar por victorias de ${currentTeamName} salvo que necesites el bonus de sorpresa. Su última jornada es do-or-die — si ganan llegarán con mucha presión y eso puede ser imprevisible.`,
      advanceProb: advProb,
      winProb: winProb,
      semiFinalProb: semiProb,
      strengths: pts >= 4
        ? ["Sólida fase de grupos","Eficacia goleadora","Organización defensiva"]
        : pts >= 2
        ? ["Competitivos en cada partido","Potencial de mejora","Colectivo comprometido"]
        : ["Determinación bajo presión","Posibilidad de sorpresa","Nada que perder"],
      weaknesses: pts >= 4
        ? ["Puede relajarse en el 3er partido","Presión de ser favorito en KO"]
        : pts >= 2
        ? ["Inconsistencia en resultados","Dependencia de resultados ajenos"]
        : ["Déficit de puntos es difícil de remontar","Confianza baja","Presión extrema"],
      keyPlayers: d.players
        .filter(p => p.goals > 0 || p.assists > 0 || parseFloat(p.rating) >= 8.0)
        .sort((a,b) => (b.goals*2+b.assists+parseFloat(b.rating)) - (a.goals*2+a.assists+parseFloat(a.rating)))
        .slice(0,3)
        .map(p => ({
          name: p.name,
          role: `${p.pos} · ${p.goals} goles, ${p.assists} asistencias en el torneo`,
          impactScore: p.rating
        })),
      nextMatchPrediction: `Partido 3 de grupos: ${currentTeamName} necesita ${pts < 3 ? 'una victoria para sobrevivir' : 'al menos un empate para asegurar el pase'}. Pronóstico: ${pts >= 4 ? '✅ Pasan como primeros o segundos del grupo' : pts >= 2 ? '⚠️ Todo por definir, partido de alto voltaje' : '❌ Necesitan el milagro, pero tienen 11 jugadores en el campo'}.`,
      style: pts >= 4 ? "Juego directo y efectivo, con transiciones rápidas y solidez defensiva." : "Combinan posesión y contragolpe según el rival, buscando aprovechar los espacios.",
      riskLevel: risk,
      riskReason: risk === 'Bajo' ? "Están en buena posición con puntos suficientes para clasificar casi con seguridad."
        : risk === 'Medio' ? "Su clasificación depende del último partido — hay incertidumbre real."
        : "Con 0-1 puntos, necesitan ganar sí o sí para seguir en el torneo."
    };

    renderRecommendations(rec);
  }, 800);
}

function renderRecommendations(r) {
  document.getElementById('recsLoading').style.display = 'none';

  const riskColor = r.riskLevel === 'Bajo' ? 'var(--green)' : r.riskLevel === 'Medio' ? 'var(--accent2)' : 'var(--red)';
  const riskTag = r.riskLevel === 'Bajo' ? 'tag-green' : r.riskLevel === 'Medio' ? 'tag-orange' : 'tag-red';

  document.getElementById('recsContent').innerHTML = `

    <!-- VEREDICTO QUINIELA -->
    <div class="verdict-box">
      <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;">
        <div>
          <div class="verdict-score">${r.quinielaScore}<span style="font-size:1.5rem;color:var(--muted)">/10</span></div>
          <div class="verdict-label">Puntuación Quiniela</div>
        </div>
        <div style="flex:1;min-width:180px;">
          <span class="tag ${riskTag}" style="margin-bottom:6px;display:inline-block;">Riesgo ${r.riskLevel}</span>
          <div style="font-size:.8rem;color:var(--muted);line-height:1.4;">${r.riskReason}</div>
        </div>
      </div>
      <div class="verdict-text">${r.quinielaVerdict}</div>
    </div>

    <!-- CONSEJO QUINIELA -->
    <div class="rec-card">
      <div class="rec-card-title"><span>💡</span> Consejo para tu quiniela</div>
      <div class="quinela-tip">${r.quinielaTip}</div>
    </div>

    <!-- PROBABILIDADES -->
    <div class="rec-card">
      <div class="rec-card-title"><span>📊</span> Probabilidades de avance</div>

      <div class="prob-bar-wrap">
        <div class="prob-label"><span>Clasificar de grupos</span><span style="color:var(--green)">${r.advanceProb}%</span></div>
        <div class="prob-bar"><div class="prob-fill" style="width:${r.advanceProb}%;background:var(--green)"></div></div>
      </div>

      <div class="prob-bar-wrap">
        <div class="prob-label"><span>Llegar a Semifinal</span><span style="color:var(--accent)">${r.semiFinalProb}%</span></div>
        <div class="prob-bar"><div class="prob-fill" style="width:${r.semiFinalProb}%;background:var(--accent)"></div></div>
      </div>

      <div class="prob-bar-wrap">
        <div class="prob-label"><span>Ganar el Mundial</span><span style="color:var(--accent2)">${r.winProb}%</span></div>
        <div class="prob-bar"><div class="prob-fill" style="width:${r.winProb}%;background:var(--accent2)"></div></div>
      </div>
    </div>

    <!-- FORTALEZAS Y DEBILIDADES -->
    <div class="rec-card">
      <div class="rec-card-title"><span>⚖️</span> Análisis del equipo</div>
      <div style="margin-bottom:10px;font-size:.8rem;letter-spacing:1px;text-transform:uppercase;color:var(--green);font-weight:700;">Fortalezas</div>
      <div class="tag-list" style="margin-bottom:16px;">
        ${r.strengths.map(s => `<span class="tag tag-green">✓ ${s}</span>`).join('')}
      </div>
      <div style="margin-bottom:10px;font-size:.8rem;letter-spacing:1px;text-transform:uppercase;color:var(--red);font-weight:700;">Debilidades</div>
      <div class="tag-list" style="margin-bottom:14px;">
        ${r.weaknesses.map(w => `<span class="tag tag-red">✗ ${w}</span>`).join('')}
      </div>
      <div style="margin-top:14px;background:rgba(0,194,255,0.05);border:1px solid rgba(0,194,255,0.1);border-radius:8px;padding:10px 14px;font-size:.85rem;color:var(--muted);">
        🎮 <strong style="color:var(--text)">Estilo de juego:</strong> ${r.style}
      </div>
    </div>

    <!-- JUGADORES CLAVE -->
    <div class="rec-card">
      <div class="rec-card-title"><span>⭐</span> Jugadores clave para la quiniela</div>
      ${r.keyPlayers.map((p,i) => `
        <div class="player-key-row">
          <div class="player-key-icon">${['⭐','🔥','💎'][i] || '🎯'}</div>
          <div class="player-key-info">
            <div class="player-key-name">${p.name}</div>
            <div class="player-key-role">${p.role}</div>
          </div>
          <div class="player-key-score">${p.impactScore}</div>
        </div>
      `).join('')}
    </div>

    <!-- PREDICCIÓN PRÓXIMO PARTIDO -->
    <div class="rec-card">
      <div class="rec-card-title"><span>🔮</span> Predicción próxima fase</div>
      <div style="font-size:.95rem;line-height:1.65;color:var(--text);">${r.nextMatchPrediction}</div>
    </div>

    <div class="ai-note">
      <strong>⚡ Claude AI</strong> — Recomendaciones generadas por IA. Úsalas como referencia, no como garantía.
    </div>
  `;
}

// ── INIT ──
renderTeams();

// keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
